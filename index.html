<head>
<meta charset="UTF-8">

<title>Movindi Disalma – La Viola Tech ID</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:radial-gradient(ellipse at 25% 25%,#3d1a6e 0%,#1a0a2e 55%,#0d0520 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;padding:40px 20px;font-family:'Raleway',sans-serif}
.page-title{font-family:'Cinzel',serif;color:#d4a0ff;font-size:.85rem;letter-spacing:.45em;text-transform:uppercase}
#id-card{width:380px;border-radius:26px;overflow:hidden;box-shadow:0 0 0 1.5px rgba(176,106,255,.45),0 28px 80px rgba(0,0,0,.75),0 0 90px rgba(139,69,212,.25)}
.card-top{background:linear-gradient(150deg,#3d1a6e 0%,#2d1057 45%,#1a0a2e 100%);padding:26px 26px 22px;position:relative;overflow:hidden}
.card-top::before{content:'';position:absolute;top:-70px;right:-70px;width:220px;height:220px;background:radial-gradient(circle,rgba(176,106,255,.16) 0%,transparent 70%);border-radius:50%}
.card-top::after{content:'';position:absolute;bottom:0;left:5%;right:5%;height:1.5px;background:linear-gradient(90deg,transparent,#a855f7,#c084fc,#a855f7,transparent)}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:22px;position:relative;z-index:2}
.logo-img{width:52px;height:52px;border-radius:11px;object-fit:cover;border:1.5px solid rgba(192,132,252,.55);box-shadow:0 0 18px rgba(139,69,212,.55)}
.brand-name{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:900;color:#f3e8ff;letter-spacing:.08em}
.brand-sub{font-size:.5rem;color:#c084fc;letter-spacing:.26em;text-transform:uppercase;margin-top:3px}
.brand-tag{font-size:.4rem;color:rgba(192,132,252,.6);letter-spacing:.18em;text-transform:uppercase;margin-top:2px}
.photo-wrap{display:flex;justify-content:center;z-index:2;position:relative;padding-bottom:4px}
.hex-outer{width:150px;height:173px;position:relative;display:flex;align-items:center;justify-content:center}
.hex-border{clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);width:150px;height:173px;background:linear-gradient(135deg,#c084fc,#a855f7,#7c3aed);position:absolute;filter:drop-shadow(0 0 14px rgba(192,132,252,.7))}
.hex-photo{clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);width:136px;height:157px;overflow:hidden;position:relative;z-index:1}
.hex-photo img{width:100%;height:100%;object-fit:cover;object-position:center top}
.card-bottom{background:linear-gradient(175deg,#ffffff 0%,#f5f0ff 100%);padding:22px 28px 26px}
.member-name{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:900;color:#1a0a2e;text-align:center;margin-bottom:8px;letter-spacing:.02em}
.desg-badge{display:block;background:linear-gradient(135deg,#8b45d4,#5c2d91);color:#fff;font-size:.68rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;padding:7px 24px;border-radius:24px;width:fit-content;margin:0 auto 10px;box-shadow:0 5px 18px rgba(139,69,212,.4)}
.id-num{text-align:center;color:rgba(92,45,145,.5);font-size:.6rem;letter-spacing:.24em;margin-bottom:18px;font-weight:600}
.divider{height:1px;margin-bottom:16px;background:linear-gradient(90deg,transparent,rgba(139,69,212,.25),transparent)}
.info-rows{display:flex;flex-direction:column;gap:12px}
.info-row{display:flex;align-items:center;gap:13px}
.info-icon{width:30px;height:30px;flex-shrink:0;background:linear-gradient(135deg,#8b45d4,#5c2d91);border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(139,69,212,.35)}
.info-icon svg{width:15px;height:15px;fill:#fff}
.info-label{font-weight:800;color:#2d1057;min-width:48px;font-size:.75rem;letter-spacing:.02em}
.info-value{color:#3d2070;font-size:.78rem;font-weight:600;word-break:break-all}
.card-footer{margin-top:18px;text-align:center;color:rgba(139,69,212,.3);font-size:.48rem;letter-spacing:.2em;text-transform:uppercase}
.btn-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.btn-download{background:linear-gradient(135deg,#8b45d4,#5c2d91);color:#fff;border:none;padding:13px 40px;border-radius:30px;font-family:'Raleway',sans-serif;font-size:.9rem;font-weight:800;letter-spacing:.1em;cursor:pointer;box-shadow:0 5px 24px rgba(139,69,212,.55);transition:all .2s}
.btn-download:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(139,69,212,.75)}
.hint{color:rgba(212,160,255,.45);font-size:.6rem;letter-spacing:.1em}
</style>
